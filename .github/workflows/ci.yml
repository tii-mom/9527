name: CI

on:
  pull_request:
  push:
    branches: [main, codex/9527mvp]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/9527?schema=public
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      ADMIN_TOKEN: dev-admin-token
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build
      - run: pnpm typecheck
