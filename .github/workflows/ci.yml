name: CI

on:
  pull_request:
  push:
    branches: [main, codex/9527mvp]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: 9527
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/9527?schema=public
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      ADMIN_TOKEN: dev-admin-token
      WEB_BASE_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm db:push
      - run: pnpm db:seed
